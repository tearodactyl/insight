<a class="dropdown-toggle" data-toggle="dropdown" href="#">
  {{currency.symbol}} <span class="caret"></span>
</a>
<ul class="dropdown-menu">
  <li>
  <a data-ng-click="setCurrency('USD')" data-ng-class="{active: currency.symbol == 'USD'}">USD</a>
  </li>
  <li>
  <a data-ng-click="setCurrency(currency.netSymbol)" data-ng-class="{active: currency.symbol == currency.netSymbol}">{{currency.netSymbol}}</a>
  </li>
  <li>
  <a data-ng-click="setCurrency('m'+currency.netSymbol)" data-ng-class="{active: currency.symbol == ('m'+currency.netSymbol)}">m{{currency.netSymbol}}</a>
  </li>
  <li>
  <a data-ng-click="setCurrency('bits')" data-ng-class="{active: currency.symbol == 'bits'}">bits</a>
  </li>
  <!-- SAMPLE #5 (now color-coded): raw price factor. A live feed shows a non-zero
       rate (muted grey); a 0/absent factor is the visible signature of the Crash #4
       expired-CA fallback (currency.js sets usd/btc=0 when the fetch fails) and
       turns red. No log-diving needed. -->
  <li class="divider"></li>
  <li>
    <small style="padding-left:20px" class="text-muted" data-ng-show="currency.factor">factor: {{currency.factor}}</small>
    <small style="padding-left:20px" class="text-danger" data-ng-show="!currency.factor"><span class="glyphicon glyphicon-warning-sign"></span> no price feed</small>
  </li>
</ul>
