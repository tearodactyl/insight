<div class="connection-status container" data-ng-controller="ConnectionController">

  <div class="alert alert-danger"
    data-ng-show="!serverOnline || !clienteOnline || !apiOnline"
    data-ng-init="getConnStatus()">

    <strong translate>Error!</strong>

    <p data-ng-show="!apiOnline">
      Can't connect to zerod to get live updates
    </p>

    <p data-ng-show="!serverOnline" translate>
      Can't connect to insight server. Attempting to reconnect...
    </p>

    <p data-ng-show="!clienteOnline" translate>
      Can't connect to internet. Please, check your connection.
    </p>

  </div>

  <!-- SAMPLE #1: positive heartbeat as a green alert box, symmetric with the
       red alert-danger above. The shipped template only ever renders the failure
       side, so a healthy node shows nothing. Semantic color only (green=ok),
       alert-success is already in the bundle. Plain text — no new gettext key. -->
  <div class="alert alert-success" data-ng-show="apiOnline && serverOnline && clienteOnline">
    <span class="glyphicon glyphicon-ok"></span>
    <strong>Live</strong>
    Connected to zerod &middot; insight server &middot; internet.
  </div>
</div>
