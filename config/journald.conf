# /etc/systemd/journald.conf  (the [Journal] keys that matter for the explorer)
# Both units log StandardOutput=journal / StandardError=journal, so the journal
# is the single sink. These caps make a runaway log impossible to fill the disk.
# Apply with: systemctl restart systemd-journald
# View per-run:  journalctl -u bitcore -b      (this boot)
#                journalctl -u bitcore --since "1 hour ago"

[Journal]
SystemMaxUse=1G          # hard cap on disk used by the journal
SystemMaxFileSize=100M   # rotate individual journal files at this size
MaxRetentionSec=1month   # drop entries older than one month
