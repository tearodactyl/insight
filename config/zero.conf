# /home/ubuntu/.zero/zero.conf   (perms 600)
# Real rpcuser/rpcpassword live ONLY in the on-disk copy; redacted here.
# NOTE: no datadir= line and no pid= line — those are passed on the zerod
# command line by zerod.service (-datadir / -pid).

rpcuser=<REDACTED>
rpcpassword=<REDACTED>
rpcport=23811
port=23801
txindex=1
insightexplorer=1
experimentalfeatures=1
rpcworkqueue=1024
zmqpubrawtx=tcp://127.0.0.1:28332
zmqpubhashblock=tcp://127.0.0.1:28332
rpcallowip=127.0.0.1
uacomment=bitcore
server=1
showmetrics=0
